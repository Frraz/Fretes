# ==============================================================================
# docker-compose.yml — Fretes (Controle de Fretes SF & SJ)
# Stack: PostgreSQL 16 + Django/Gunicorn
# Dominio: fretes.ferzion.com.br
# Porta local: 127.0.0.1:8004:8000  (Nginx faz proxy reverso)
#
# Servidor: 2 vCPUs / 7.8GB RAM — dividido entre 5 sistemas Django
# Budget deste sistema: ~0.3 CPU / ~400MB RAM total (sistema leve, read-only)
# ==============================================================================

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "5m"
    max-file: "3"

x-restart: &default-restart
  restart: unless-stopped

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: fretes_db
    <<: *default-restart
    environment:
      POSTGRES_DB:          ${POSTGRES_DB}
      POSTGRES_USER:        ${POSTGRES_USER}
      POSTGRES_PASSWORD:    ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    tmpfs:
      - /tmp:size=32m,mode=1777
    networks:
      - fretes_net
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    command: >
      postgres
      -c shared_buffers=32MB
      -c work_mem=2MB
      -c maintenance_work_mem=16MB
      -c effective_cache_size=64MB
      -c max_connections=10
      -c random_page_cost=1.1
      -c checkpoint_completion_target=0.9
      -c wal_buffers=4MB
      -c log_min_duration_statement=1000
      -c log_destination=stderr
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: 128M
        reservations:
          cpus: "0.02"
          memory: 64M

  # ── Web (Django + Gunicorn) ─────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: fretes_web:latest
    container_name: fretes_web
    <<: *default-restart
    env_file: .env.prod
    volumes:
      - static_volume:/app/staticfiles
    tmpfs:
      - /tmp:size=32m,mode=1777
    ports:
      - "127.0.0.1:8004:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - fretes_net
    logging: *default-logging
    command:
      - sh
      - -c
      - |
        echo '==> Rodando migrations...' &&
        python manage.py migrate --noinput &&
        echo '==> Coletando estaticos...' &&
        python manage.py collectstatic --noinput &&
        echo '==> Importando planilha do Google Drive...' &&
        python manage.py importar_planilha &&
        echo '==> Iniciando Gunicorn...' &&
        exec gunicorn config.wsgi:application \
          --bind 0.0.0.0:8000 \
          --workers 2 \
          --threads 2 \
          --timeout 120 \
          --max-requests 500 \
          --max-requests-jitter 50 \
          --access-logfile - \
          --error-logfile -
    deploy:
      resources:
        limits:
          cpus: "0.3"
          memory: 256M
        reservations:
          cpus: "0.05"
          memory: 128M

volumes:
  postgres_data:
    driver: local
  static_volume:
    driver: local

networks:
  fretes_net:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.enable_icc: "true"
      com.docker.network.driver.mtu: "1450"