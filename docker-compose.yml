services:
  db:
    image: postgres:16-alpine
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fretes}
      POSTGRES_USER: ${POSTGRES_USER:-fretes}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fretes123}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fretes}"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build: .
    restart: always
    volumes:
      - .:/app
      - static_files:/app/staticfiles
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER:-fretes}:${POSTGRES_PASSWORD:-fretes123}@db:5432/${POSTGRES_DB:-fretes}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-dev-secret}
      - DJANGO_DEBUG=${DJANGO_DEBUG:-1}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      - GDRIVE_FILE_ID=${GDRIVE_FILE_ID}
    ports:
      - "${PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "
        python manage.py migrate --noinput &&
        python manage.py collectstatic --noinput 2>/dev/null;
        python manage.py importar_planilha;
        gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120
      "

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_files:/app/staticfiles:ro
    depends_on:
      - web
    profiles:
      - production

volumes:
  postgres_data:
  static_files:
